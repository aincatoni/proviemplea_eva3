# docker-compose.yml
services:
  app:
    build:
      context: ./docker/php
    container_name: proviemplea_app
    volumes:
      - ./backend:/var/www/html
    networks:
      - proviemplea_net
    depends_on:
      - db
  webserver:
    image: nginx:stable-alpine
    container_name: proviemplea_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - proviemplea_net
    depends_on:
      - app
  db:
    image: mysql:8.0
    container_name: proviemplea_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proviemplea
      MYSQL_USER: proviemplea_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - proviemplea_net
networks:
  proviemplea_net:
    driver: bridge
volumes:
  db_data: